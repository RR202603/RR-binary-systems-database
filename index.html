<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>二元体系相图与热力学数据库</title>
  <link rel="stylesheet" href="styles.css?v=14" />
</head>

<h2>请输入密码以访问网站：</h2>
<form id="passwordForm">
    <input type="password" id="password" placeholder="请输入密码" required />
    <button type="submit">提交</button>
</form>

<script>
    // 设置正确的密码
    const correctPassword = "RR2026";  // 更改为你选择的密码

    const passwordForm = document.getElementById("passwordForm");
    const passwordInput = document.getElementById("password");

    passwordForm.addEventListener("submit", function(event) {
        event.preventDefault();
        const enteredPassword = passwordInput.value;

        if (enteredPassword === correctPassword) {
            alert("密码正确！现在可以访问网站。");
            // 将页面重定向到主内容页面，或者继续加载当前页面
            window.location.href = "#";  // 或者设置为目标页面地址，如 'mainPage.html'
        } else {
            alert("密码错误，请再试一次。");
        }
    });
</script>



<body>
  <!-- 密码保护界面 -->
  <div id="passwordPage">
      <h2>请输入密码以访问网站：</h2>
      <form id="passwordForm">
          <input type="password" id="password" placeholder="请输入密码" required />
          <button type="submit">提交</button>
      </form>
  </div>s

  <script>
      const correctPassword = "RR2026";  // 更改为你选择的密码

      const passwordForm = document.getElementById("passwordForm");
      const passwordInput = document.getElementById("password");

      passwordForm.addEventListener("submit", function(event) {
          event.preventDefault();  // 阻止表单提交

          const enteredPassword = passwordInput.value;

          if (enteredPassword === correctPassword) {
              alert("密码正确！现在可以访问网站。");

              document.getElementById("passwordPage").style.display = "none";
              document.getElementById("contentPage").style.display = "block";
          } else {
              alert("密码错误，请再试一次。");
          }
      });
  </script>

  <!-- 需要显示的网页内容（隐藏在密码保护界面之后） -->
  <div id="contentPage" style="display: none;">
    <!-- 顶部抬头栏：左侧标题，右侧公司名 -->
    <header class="header-bar">
      <h1>二元体系相图与热力学数据库</h1>
      <div class="brand">长沙锐睿科技有限公司</div>
    </header>

    <main class="layout">
      <section class="pt-wrap">
        <div id="periodic-table" class="pt"></div>
        <div class="pt-hints">
          <span class="hint">* 镧系（La–Lu）</span>
          <span class="hint">** 锕系（Ac–Lr）</span>
        </div>
      </section>

      <aside class="panel">
        <div class="selection">
          <h2>当前选择</h2>
          <div id="selection-text">未选择</div>
          <button id="btn-reset" class="reset">重置</button>
        </div>

        <div class="results">
          <h2 id="results-title">匹配结果</h2>
          <div id="results"></div>
        </div>
      </aside>
    </main>
  </div>

  <script src="script.js?v=14"></script>
</body>
</html>
